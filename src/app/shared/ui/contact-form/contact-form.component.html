<div class="contact-form-container">
  <div class="contact-form-card">
    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
      <!-- Họ và tên -->
      <div class="form-group">
        <label for="fullName">Họ và tên <span class="required">*</span></label>
        <input 
          id="fullName" 
          type="text" 
          formControlName="fullName" 
          placeholder="VD: Nguyễn Thị Hoa"
          [class.is-invalid]="isFieldInvalid('fullName')"
        />
        @if (isFieldInvalid('fullName')) {
          <span class="error-msg">Vui lòng nhập họ và tên</span>
        }
      </div>

      <!-- Số điện thoại -->
      <div class="form-group">
        <label for="phone">Số điện thoại <span class="required">*</span></label>
        <input 
          id="phone" 
          type="tel" 
          formControlName="phone" 
          placeholder="VD: 0901 234 567"
          [class.is-invalid]="isFieldInvalid('phone')"
        />
        @if (isFieldInvalid('phone')) {
          <span class="error-msg">Vui lòng nhập số điện thoại hợp lệ (10 chữ số)</span>
        }
      </div>

      <!-- Concept yêu thích -->
      <div class="form-group">
        <label for="preferredService">Concept yêu thích</label>
        <select id="preferredService" formControlName="preferredService">
          <option value="">-- Chọn dịch vụ --</option>
          @for (service of services(); track service.id) {
            <option [value]="service.slug">{{ service.name }}</option>
          }
        </select>
      </div>

      <!-- Ý tưởng concept cụ thể -->
      <div class="form-group">
        <label for="conceptIdea">Ý tưởng concept cụ thể (nếu có)</label>
        <input 
          id="conceptIdea" 
          type="text" 
          formControlName="conceptIdea" 
          placeholder="VD: Áo dài sen, Mẹ và con, Retro Sài Gòn xưa..."
        />
      </div>

      <!-- Cơ sở gần nhất -->
      <div class="form-group">
        <label>Cơ sở gần nhất</label>
        <div class="branch-selector">
          @for (branch of branches(); track branch.name) {
            <button type="button"
                    class="branch-btn"
                    [class.branch-btn--active]="contactForm.get('branch')?.value === branch.name"
                    (click)="contactForm.get('branch')?.setValue(branch.name)">
              <span class="branch-btn__icon">📍</span>
              <div class="branch-btn__info">
                <span class="branch-btn__name">{{ branch.name }}</span>
                <span class="branch-btn__sub">{{ branch.address }}</span>
              </div>
            </button>
          }
        </div>
      </div>

      <!-- Ghi chú thêm -->
      <div class="form-group">
        <label for="notes">Ghi chú thêm (tuỳ chọn)</label>
        <textarea 
          id="notes" 
          formControlName="notes" 
          rows="4" 
          placeholder="VD: Muốn chụp dịp sinh nhật, cần concept Tết, đi cùng bé 3 tuổi..."
        ></textarea>
      </div>

      <!-- Submit button -->
      <button type="submit" class="submit-button" [disabled]="contactForm.invalid">
        Để ekip liên hệ với bạn →
      </button>

      <!-- Commitment text -->
      <p class="commitment-text">
        HANTO Studio cam kết chỉ gọi một cuộc để tư vấn. Không spam, không làm phiền nếu bạn chưa sẵn sàng.
      </p>
    </form>
  </div>

</div>
