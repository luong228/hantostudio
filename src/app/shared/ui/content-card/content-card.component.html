<a class="card" [routerLink]="route()" [attr.aria-label]="'Xem chi tiết ' + title()">
  <img [src]="image()" [alt]="title()" loading="lazy" />
  <div class="card__overlay"></div>
  <div class="card__content">
    @if (eyebrow()) {
      <p class="card__eyebrow">{{ eyebrow() }}</p>
    }
    <h3>{{ title() }}</h3>
    <p class="card__subtitle">{{ description() }}</p>
    <div class="card__meta">
      @if (meta()) {
        <p>{{ meta() }}</p>
      }
      <span>{{ ctaLabel() }}</span>
    </div>
  </div>
</a>
