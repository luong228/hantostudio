<section class="page-wrap">
  <app-section-header
    eyebrow="Danh Mục Dịch Vụ"
    title="Chọn nhóm chụp đúng nhu cầu: chân dung, gia đình, concept"
    subtitle="Mỗi dịch vụ đều có hướng dẫn trước buổi chụp, ekip hỗ trợ tại set và quy trình giao ảnh rõ ràng." />

  <div class="grid">
    @for (service of repo.services(); track service.id) {
      <app-content-card
        [title]="service.name"
        [description]="service.shortDescription"
        [image]="service.heroImage"
        [meta]="service.durationMinutes + ' phút'"
        [route]="'/dich-vu/' + service.slug" />
    }
  </div>

  <app-conversion-banner
    title="Chưa chắc nên chọn gói nào?"
    subtitle="Gửi mục tiêu chụp và timeline, studio sẽ đề xuất format phù hợp để tối ưu chi phí và kết quả."
    primaryLabel="Tư vấn nhanh"
    primaryRoute="/lien-he"
    secondaryLabel="Xem bộ sưu tập"
    secondaryRoute="/bo-suu-tap" />
</section>
