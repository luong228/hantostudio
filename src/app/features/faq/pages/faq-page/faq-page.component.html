<section class="page-wrap">
  <app-section-header
    eyebrow="Câu Hỏi Thường Gặp"
    title="Giải đáp giúp bạn đặt lịch dễ dàng hơn"
    subtitle="Nếu bạn vẫn cần thêm thông tin, hãy gửi câu hỏi và chúng tôi sẽ trả lời trực tiếp." />

  <div class="faq-list">
    @for (item of repo.faqItems(); track item.id) {
      <details>
        <summary class="faq-question">{{ item.question }}</summary>
        <p class="faq-answer">{{ item.answer }}</p>
      </details>
    }
  </div>

  <app-conversion-banner
    title="Vẫn đang phân vân? Hãy để chúng tôi tư vấn trong một cuộc gọi nhanh"
    subtitle="Chúng tôi sẽ giúp bạn chọn gói, định hướng styling và thời gian lý tưởng."
    primaryLabel="Hỏi đội ngũ chúng tôi"
    primaryRoute="/lien-he"
    secondaryLabel="Xem bảng giá"
    secondaryRoute="/bang-gia" />
</section>
