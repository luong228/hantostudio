<section class="section">
  <app-section-header
    eyebrow="Câu Hỏi Nhanh"
    title="Giải đáp trước khi đặt lịch: cọc, lịch chụp, giao ảnh, địa điểm"
    subtitle="Những thông tin quan trọng nhất để bạn quyết định nhanh và yên tâm." />

  <div class="faq-list">
    @for (item of faqs(); track item.id) {
      <article>
        <h3>{{ item.question }}</h3>
        <p>{{ item.answer }}</p>
      </article>
    }
  </div>

  <app-button label="Xem tất cả câu hỏi" route="/cau-hoi-thuong-gap" variant="ghost" />
</section>
