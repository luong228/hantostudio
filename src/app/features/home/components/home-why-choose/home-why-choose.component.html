<section class="section">
  <app-section-header
    eyebrow="Why This Studio"
    title="Warm guidance, premium finish, zero awkward energy"
    subtitle="We are known for making clients feel looked after, not over-directed." />

  <div class="grid">
    @for (item of items(); track item.title) {
      <article>
        <h3>{{ item.title }}</h3>
        <p>{{ item.description }}</p>
      </article>
    }
  </div>
</section>
