<section class="section">
  <app-section-header
    eyebrow="Tại Sao Chọn Studio Này"
    title="Hướng dẫn ấm áp, thành phẩm cao cấp, không có sự gượng gạo"
    subtitle="Chúng tôi được biết đến với khả năng khiến khách hàng cảm thấy được quan tâm, không bị chỉ đạo quá mức." />

  <div class="grid">
    @for (item of items(); track item.title) {
      <article>
        <h3>{{ item.title }}</h3>
        <p>{{ item.description }}</p>
      </article>
    }
  </div>
</section>
