<section class="section">
  <app-section-header
    eyebrow="Khách Hàng Xác Thực"
    title="Đánh giá thật sau khi nhận bộ ảnh hoàn chỉnh"
    subtitle="Tập trung vào 3 yếu tố chốt đơn: chất lượng ảnh, trải nghiệm chụp, tốc độ bàn giao." />

  <div class="proof-headline">
    <p><strong>Đánh giá trung bình:</strong> 4.9/5 từ khách hàng đã đặt lịch</p>
    <p><strong>Báo chí đề cập:</strong> Đang cập nhật danh sách báo chí và đối tác thương hiệu</p>
  </div>

  <div class="grid">
    @for (item of testimonials(); track item.name + item.sessionType) {
      <blockquote>
        <p class="stars" aria-label="Rated {{ item.rating }} out of 5">{{ stars(item.rating) }}</p>
        <p class="quote">“{{ item.quote }}”</p>
        <footer>
          <cite>{{ item.name }}</cite>
          <span>{{ item.sessionType }}</span>
        </footer>
      </blockquote>
    }
  </div>
</section>
