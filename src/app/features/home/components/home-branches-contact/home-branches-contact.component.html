<section class="section">
  <header class="contact-hd">
    <p class="contact-hd__eyebrow">Chi Nhánh & Liên Hệ</p>
    <div class="contact-hd__ornament" aria-hidden="true">
      <span></span>
      <svg viewBox="0 0 16 10" fill="currentColor"><path d="M8 0 L11 5 L8 10 L5 5 Z" /></svg>
      <span></span>
    </div>
    <h2>Tìm chúng tôi</h2>
  </header>

  <div class="panel">
    <div class="panel-grid panel-grid--2">
      <article class="info-card">
        <span class="info-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.1 4.18 2 2 0 0 1 4.09 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.1 9.91a16 16 0 0 0 6 6l1.27-1.24a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
          </svg>
        </span>
        <div class="info-body">
          <p class="info-label">Hotline tư vấn</p>
          <a class="info-value" [href]="'tel:' + studioInfo().phone.replaceAll(' ', '')">{{ studioInfo().phone }}</a>
          <p class="info-note">(9:00 – 19:00 mỗi ngày)</p>
        </div>
      </article>

      <article class="info-card">
        <span class="info-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
        </span>
        <div class="info-body">
          <p class="info-label">Giờ làm việc</p>
          <p class="info-value">{{ studioInfo().openingHours }}</p>
          <p class="info-note">Tất cả các ngày trong tuần</p>
        </div>
      </article>
    </div>

    <article class="info-card info-card--full">
      <span class="info-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
          <circle cx="12" cy="10" r="3" />
        </svg>
      </span>
      <div class="info-body">
        <p class="info-label">Địa chỉ studio</p>
        <p class="info-value">{{ studioInfo().address }}</p>
      </div>
    </article>

    <div class="panel-grid panel-grid--2">
      <article class="info-card">
        <span class="info-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16v16H4z" />
            <path d="M4 7l8 6 8-6" />
          </svg>
        </span>
        <div class="info-body">
          <p class="info-label">Email</p>
          <a class="info-value info-value--small" [href]="channelHref('Email')">{{ channelValue('Email') }}</a>
        </div>
      </article>

      <article class="info-card">
        <span class="info-icon info-icon--zalo" aria-hidden="true">Zalo</span>
        <div class="info-body">
          <p class="info-label">Zalo</p>
          <a class="info-value info-value--small" [href]="channelHref('Zalo')" target="_blank" rel="noopener noreferrer">{{ channelValue('Zalo') }}</a>
        </div>
      </article>
    </div>
  </div>
</section>
