<section class="section">
  <app-section-header
    eyebrow="Chi Nhánh Và Liên Hệ"
    title="2 chi nhánh, hotline rõ ràng, mở cửa mỗi ngày"
    subtitle="Bạn có thể đặt lịch qua hotline, Zalo, Facebook hoặc đến trực tiếp studio theo khung giờ hoạt động." />

  <div class="meta-strip">
    <p><strong>Hotline:</strong> <a [href]="'tel:' + studioInfo().phone.replaceAll(' ', '')">{{ studioInfo().phone }}</a></p>
    <p><strong>Giờ mở cửa:</strong> {{ studioInfo().openingHours }}</p>
  </div>

  <div class="branches">
    @for (branch of branches(); track branch.name) {
      <article>
        <h3>{{ branch.name }}</h3>
        <p>{{ branch.address }}</p>
        <a [href]="'tel:' + branch.phone.replaceAll(' ', '')">{{ branch.phone }}</a>
      </article>
    }
  </div>

  <div class="channels">
    @for (channel of channels(); track channel.label) {
      <a [href]="channel.href" target="_blank" rel="noopener noreferrer">{{ channel.label }}: {{ channel.value }}</a>
    }
  </div>
</section>
