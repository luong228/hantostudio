<section class="section">
  <app-section-header
    eyebrow="Quy Trình Đặt Lịch"
    title="Các bước rõ ràng, không lo mơ hồ"
    subtitle="Từ tin nhắn đầu tiên đến khi giao ảnh, mọi bước đều rõ ràng và có thời hạn." />

  <ol>
    @for (step of steps(); track step.step) {
      <li>
        <p class="step">{{ step.step }}</p>
        <h3>{{ step.title }}</h3>
        <p>{{ step.description }}</p>
      </li>
    }
  </ol>
</section>
