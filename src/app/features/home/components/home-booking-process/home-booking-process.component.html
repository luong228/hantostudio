<section class="booking-process">
  <header class="booking-hd">
    <p class="booking-hd__eyebrow">Quy Trình Đặt Lịch</p>
    <div class="booking-hd__ornament" aria-hidden="true">
      <span></span>
      <svg viewBox="0 0 16 10" fill="currentColor"><path d="M8 0 L11 5 L8 10 L5 5 Z" /></svg>
      <span></span>
    </div>
    <h2>Các bước rõ ràng, nhẹ nhàng<br />từ lúc đặt lịch đến khi nhận ảnh</h2>
  </header>

  <ol class="booking-steps">
    @for (step of steps(); track step.step) {
      <li class="booking-step">
        <span class="booking-step__num">{{ step.step }}</span>
        <div class="booking-step__body">
          <h3>{{ step.title }}</h3>
          <p>{{ step.description }}</p>
        </div>
      </li>
    }
  </ol>
</section>
