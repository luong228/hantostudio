<section class="section">

  <header class="svc-hd">
    <p class="svc-hd__eyebrow">{{ eyebrow() }}</p>
    <div class="svc-hd__ornament" aria-hidden="true">
      <span></span>
      <svg viewBox="0 0 16 10" fill="currentColor"><path d="M8 0 L11 5 L8 10 L5 5 Z"/></svg>
      <span></span>
    </div>
    <h2>{{ title() }}</h2>
    @if (subtitle()) {
      <p class="svc-hd__sub">{{ subtitle() }}</p>
    }
  </header>

  <div class="grid">
    @for (service of services(); track service.id) {
      <a class="svc-card" [routerLink]="'/dich-vu/' + service.slug">

        <img class="svc-card__bg" [src]="service.heroImage" [alt]="service.name" loading="lazy" />

        <div class="svc-card__content">
          <p class="svc-card__eyebrow">Concept</p>
          <h3>{{ service.name }}</h3>
          <p class="svc-card__desc">{{ service.shortDescription }}</p>
          <div class="svc-card__meta">
            <p>Từ {{ formatPrice(service.startingPrice) }}đ</p>
            <span>Xem chi tiết →</span>
          </div>
        </div>

      </a>
    }
  </div>

</section>
