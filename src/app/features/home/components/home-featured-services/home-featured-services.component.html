<section class="section">
  <app-section-header
    eyebrow="Dịch vụ nổi bật"
    title="3 nhóm được đặt chụp nhiều nhất của studio"
    subtitle="Chân dung, gia đình, áo dài - thai sản - concept với quy trình rõ ràng và giá khởi điểm minh bạch." />

  <div class="grid">
    @for (service of services(); track service.id) {
      <a
        class="service-card"
        [routerLink]="'/dich-vu/' + service.slug"
        [attr.aria-label]="'Xem chi tiết gói ' + service.name">
        <img [src]="service.heroImage" [alt]="service.name" loading="lazy" />
        <div class="service-card__overlay"></div>
        <div class="service-card__content">
          <p class="service-card__eyebrow">{{ getEyebrow(service) }}</p>
          <h3>{{ service.name }}</h3>
          <p class="service-card__subtitle">{{ service.shortDescription }}</p>
          <div class="service-card__meta">
            <p>Từ {{ formatPrice(service.startingPrice) }}đ</p>
            <span>Xem chi tiết →</span>
          </div>
        </div>
      </a>
    }
  </div>
</section>
