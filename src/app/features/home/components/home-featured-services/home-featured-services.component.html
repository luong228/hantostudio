<section class="section">
  <app-section-header
    eyebrow="Dịch vụ nổi bật"
    title="3 nhóm được đặt chụp nhiều nhất của studio"
    subtitle="Chân dung, gia đình, áo dài - thai sản - concept với quy trình rõ ràng và giá khởi điểm minh bạch." />

  <div class="grid">
    @for (service of services(); track service.id) {
      <app-content-card
        [title]="service.name"
        [description]="service.shortDescription"
        [image]="service.heroImage"
        [route]="'/dich-vu/' + service.slug"
        [eyebrow]="getEyebrow(service)"
        [meta]="'Từ ' + formatPrice(service.startingPrice) + 'đ'" />
    }
  </div>
</section>
