<section class="page-wrap">
  <app-section-header
    eyebrow="Nhật Ký Studio"
    title="Hướng dẫn thực tế trước ngày chụp"
    subtitle="Dùng những chia sẻ này để chuẩn bị trang phục, kỳ vọng và lịch trình một cách chắc chắn hơn." />

  <div class="grid">
    @for (post of repo.blogPosts(); track post.id) {
      <app-content-card
        [title]="post.title"
        [description]="post.excerpt"
        [image]="post.coverImage"
        [meta]="post.publishedAt + ' • ' + post.readingMinutes + ' phút đọc'"
        [route]="'/blog/' + post.slug" />
    }
  </div>

  <app-conversion-banner
    title="Sẵn sàng chuyển từ đọc sang lên kế hoạch?"
    subtitle="Gửi mục tiêu của bạn và chúng tôi sẽ gợi ý format buổi chụp phù hợp và checklist chuẩn bị."
    primaryLabel="Lên kế hoạch buổi chụp"
    primaryRoute="/lien-he"
    secondaryLabel="Xem dịch vụ"
    secondaryRoute="/dich-vu" />
</section>
