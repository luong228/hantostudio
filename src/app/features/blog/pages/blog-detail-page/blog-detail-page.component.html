<section class="page-wrap">
  @if (post(); as item) {
    <img [src]="item.coverImage" [alt]="item.title" />
    <p class="meta">{{ item.publishedAt }} • {{ item.readingMinutes }} phút đọc</p>
    <h1>{{ item.title }}</h1>
    <p class="excerpt">{{ item.excerpt }}</p>
    <article>
      <p>{{ item.content }}</p>
    </article>

    <app-conversion-banner
      title="Muốn những ý tưởng này được định hình cho buổi chụp của bạn?"
      subtitle="Đội ngũ của chúng tôi có thể hướng dẫn định hướng concept và quy trình buổi chụp dựa trên cá tính và mục đích của bạn."
      primaryLabel="Đặt lịch tư vấn"
      primaryRoute="/lien-he"
      secondaryLabel="Khám phá dịch vụ"
      secondaryRoute="/dich-vu" />

    <a routerLink="/blog">Quay lại nhật ký</a>
  } @else {
    <h1>Không tìm thấy bài viết</h1>
    <a routerLink="/blog">Quay lại nhật ký</a>
  }
</section>
