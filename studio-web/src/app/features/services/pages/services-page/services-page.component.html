<section class="page-wrap">
  <app-section-header
    eyebrow="Danh muc dich vu"
    title="Chon nhom chup dung nhu cau: chan dung, gia dinh, concept"
    subtitle="Moi dich vu deu co huong dan truoc buoi chup, ekip ho tro tai set va quy trinh giao anh ro rang." />

  <div class="grid">
    @for (service of repo.services(); track service.id) {
      <app-content-card
        [title]="service.name"
        [description]="service.shortDescription"
        [image]="service.heroImage"
        [meta]="service.durationMinutes + ' minutes'"
        [route]="'/dich-vu/' + service.slug" />
    }
  </div>

  <app-conversion-banner
    title="Chua chac nen chon goi nao?"
    subtitle="Gui muc tieu chup va timeline, studio se de xuat format phu hop de toi uu chi phi va ket qua."
    primaryLabel="Tu van nhanh"
    primaryRoute="/lien-he"
    secondaryLabel="Xem bo suu tap"
    secondaryRoute="/bo-suu-tap" />
</section>
