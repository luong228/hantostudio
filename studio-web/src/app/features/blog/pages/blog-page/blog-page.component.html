<section class="page-wrap">
  <app-section-header
    eyebrow="Studio Journal"
    title="Practical guidance before your camera day"
    subtitle="Use these notes to prepare outfits, expectations, and timing with less uncertainty." />

  <div class="grid">
    @for (post of repo.blogPosts(); track post.id) {
      <app-content-card
        [title]="post.title"
        [description]="post.excerpt"
        [image]="post.coverImage"
        [meta]="post.publishedAt + ' • ' + post.readingMinutes + ' min read'"
        [route]="'/blog/' + post.slug" />
    }
  </div>

  <app-conversion-banner
    title="Ready to move from reading to planning?"
    subtitle="Send your goals and we will suggest the right session format and preparation checklist."
    primaryLabel="Plan my session"
    primaryRoute="/lien-he"
    secondaryLabel="See services"
    secondaryRoute="/dich-vu" />
</section>
