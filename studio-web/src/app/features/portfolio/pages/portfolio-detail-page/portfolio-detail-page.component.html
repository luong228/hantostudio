<section class="page-wrap">
  @if (collection(); as item) {
    <img [src]="item.coverImage" [alt]="item.title" />
    <p class="eyebrow">{{ item.category }} collection</p>
    <h1>{{ item.title }}</h1>
    <p class="story">{{ item.story }}</p>
    <p class="count">{{ item.imageCount }} curated images</p>
    <app-button label="Tu van concept tuong tu" route="/lien-he" />

    <app-conversion-banner
      title="Want this mood for your own session?"
      subtitle="Bring a reference board or simply a feeling. We will translate it into a tailored portrait concept."
      primaryLabel="Start your concept"
      primaryRoute="/lien-he"
      secondaryLabel="Browse more stories"
      secondaryRoute="/bo-suu-tap" />
  } @else {
    <h1>Collection not found</h1>
    <p>Please explore our latest portfolio stories.</p>
    <a routerLink="/bo-suu-tap">Back to portfolio</a>
  }
</section>
